services:
  # ─── Dashboard (Web UI + REST API) ───────────────────────────
  - type: web
    name: PolyM-dashboard
    runtime: python
    rootDir: bot
    buildCommand: pip install -r requirements.txt
    startCommand: python api_server.py --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: PORT
        value: 10000
      - key: PYTHON_VERSION
        value: "3.11"
    plan: free

  # ─── Bot Worker (Trading Engine, 24/7) ───────────────────────
  - type: web
    name: PolyM-bot-worker
    runtime: python
    rootDir: bot
    buildCommand: pip install -r requirements.txt
    startCommand: python bot_worker.py
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: PYTHON_VERSION
        value: "3.11"
    plan: free
    healthCheckPath: /health
